    function formatWhatsAppPhone(phoneStr) {
      if (!phoneStr) return "";
      let clean = String(phoneStr).replace(/[^\d+]/g, "");
      if (clean.startsWith("+")) clean = clean.substring(1);
      if (clean.startsWith("972") && clean.length >= 11) return clean;
      if (clean.startsWith("05") && clean.length === 10) return "972" + clean.substring(1);
      if (clean.startsWith("5") && clean.length === 9) return "972" + clean;
      return clean;
    }

    function parseHebrewDate(val) {
      if (!val) return null;
      if (val instanceof Date) return isNaN(val.getTime()) ? null : val;
      if (typeof val === "number") {
        const date = new Date(Math.round((val - 25569) * 86400 * 1000));
        return new Date(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate());
      }
      const str = String(val).trim();
      if (!str) return null;
      const dateParts = str.split(/[\/\-\.]/);
      if (dateParts.length === 3) {
        let day = parseInt(dateParts[0], 10);
        let month = parseInt(dateParts[1], 10) - 1;
        let year = parseInt(dateParts[2], 10);
        if (day > 100) { // YYYY-MM-DD
          year = day;
          month = parseInt(dateParts[1], 10) - 1;
          day = parseInt(dateParts[2], 10);
        } else if (year < 100) {
          year += year < 70 ? 2000 : 1900;
        }
        if (!isNaN(day) && !isNaN(month) && !isNaN(year)) {
          const date = new Date(year, month, day);
          if (!isNaN(date.getTime())) return date;
        }
      }
      const parsed = Date.parse(str);
      return !isNaN(parsed) ? new Date(parsed) : null;
    }

    function calculateMonthsElapsed(startDate, referenceDate = new Date()) {
      if (!startDate) return null;
      const start = new Date(startDate);
      const ref = new Date(referenceDate);
      if (isNaN(start.getTime()) || isNaN(ref.getTime())) return null;
      let months = (ref.getFullYear() - start.getFullYear()) * 12;
      months -= start.getMonth();
      months += ref.getMonth();
      const dayDiff = ref.getDate() - start.getDate();
      const fractionalMonth = dayDiff / 30.4375;
      const elapsed = parseFloat((months + fractionalMonth).toFixed(1));
      return elapsed < 0 ? 0 : elapsed;
    }

    function removeEmojis(str) {
      if (!str) return "";
      let clean = str;
      try {
        clean = clean.replace(/\p{Emoji_Presentation}/gu, "");
        clean = clean.replace(/\p{Extended_Pictographic}/gu, "");
      } catch (e) {
        clean = clean.replace(/[\u2300-\u23FF\u2600-\u27BF\u1F300-\u1F5FF\u1F600-\u1F64F\u1F680-\u1F6FF\u1F900-\u1F9FF\u1FA00-\u1FAFF]/g, "");
      }
      clean = clean.replace(/[😊🌸✨📦🔬🧬🩺💩⏳]/g, "");
      return clean;
    }

    function buildHeaderMap(headersRow) {
      const map = {};
      if (!headersRow || !Array.isArray(headersRow)) return map;
      const norm = (s) => String(s).replace(/[\s\.\-\'\"]+/g, "").trim().toLowerCase();
      const keywordsMap = {
        "מספר משתתף": ["מספרמשתתף", "משתתף", "קודמשתתף", "id", "participant", "מסמשתתף"],
        "תאריך גיוס": ["תאריךגיוס", "גיוס", "תאריך", "date", "recruitment", "תאריךמעקב", "תאריךרישום"],
        "ת.ז.": ["תז", "ת.ז.", "תעודתזהות", "identity", "tz", "מספרזהות", "מסזהות"],
        "שם פרטי": ["שםפרטי", "פרטי", "שם", "name", "firstname"],
        "שם משפחה": ["שםמשפחה", "משפחה", "lastname", "familyname"],
        "כתובת": ["כתובת", "ישוב", "עיר", "address"],
        "מספר טלפון": ["טלפון", "נייד", "מספרטלפון", "סלולרי", "phone"],
        "כתב הסכמה": ["כתבהסכמה", "הסכמה", "consent"],
        "צואה": ["צואה", "stool", "feces"],
        "רוק": ["רוק", "saliva"],
        "סרום": ["סרום", "serum"],
        "דגימת קולונוסקופיה": ["קולונוסקופיה", "דגימתקולונוסקופיה", "colonoscopy"],
        "שאלון כללי": ["שאלוןכללי", "כללי", "generalquestionnaire"],
        "שאלון תזונתי": ["שאלוןתזונתי", "תזונתי", "שאלוןתזונה", "dietary"],
        "סטטוס במחקר": ["סטטוסבמחקר", "סטטוס", "עמודהp", "status"],
        "משתתף חוזר": ["משתתףחוזר", "חוזר"],
        "הערות": ["הערות", "הערה", "comment", "notes"],
      };

      headersRow.forEach((val, idx) => {
        if (val === null || val === undefined) return;
        const cleanCell = norm(val);
        if (!cleanCell) return;
        for (const [key, aliases] of Object.entries(keywordsMap)) {
          if (aliases.some(alias => cleanCell === norm(alias))) {
            map[key] = idx;
          }
        }
      });

      headersRow.forEach((val, idx) => {
        if (val === null || val === undefined) return;
        const cleanCell = norm(val);
        if (!cleanCell) return;
        for (const [key, aliases] of Object.entries(keywordsMap)) {
          if (map[key] !== undefined) continue;
          if (aliases.some(alias => {
            const normAlias = norm(alias);
            return normAlias.length <= 3 ? cleanCell === normAlias : (cleanCell.includes(normAlias) || normAlias.includes(cleanCell));
          })) {
            map[key] = idx;
          }
        }
      });
      return map;
    }

    function findBestHeaderRowIndex(rawGrid) {
      if (!rawGrid || rawGrid.length === 0) return 0;
      const keywords = ["משתתף", "גיוס", "שם", "טלפון", "ת" , "date", "id", "participant", "מספר", "סטטוס"];
      const norm = (s) => String(s).replace(/[\s\.\-\'\"]+/g, "").trim().toLowerCase();
      const maxRowsToScan = Math.min(rawGrid.length, 10);
      let bestRowIdx = 0;
      let maxMatchCount = 0;
      for (let r = 0; r < maxRowsToScan; r++) {
        const row = rawGrid[r];
        if (!row || !Array.isArray(row)) continue;
        let matchCount = 0;
        row.forEach(cell => {
          if (cell === null || cell === undefined) return;
          const cellStr = norm(cell);
          if (keywords.some(kw => cellStr.includes(kw))) matchCount++;
        });
        if (matchCount > maxMatchCount) {
          maxMatchCount = matchCount;
          bestRowIdx = r;
        }
      }
      return bestRowIdx;
    }

    function mapRowToParticipant(row, headerMap, referenceDate) {
      const getVal = (colName, fallbackIdx) => {
        const idx = headerMap[colName];
        if (idx === -1) return "";
        const actualIdx = idx !== undefined ? idx : fallbackIdx;
        const cell = row[actualIdx];
        if (cell === undefined || cell === null) return "";
        return String(cell).trim();
      };
      
      const getRawDate = () => {
        const idx = headerMap["תאריך גיוס"];
        if (idx === -1) return null;
        const actualIdx = idx !== undefined ? idx : 1;
        return row[actualIdx];
      };

      const id = getVal("מספר משתתף", 0);
      const rawDate = getRawDate();
      const recruitmentDate = parseHebrewDate(rawDate);
      const monthsElapsed = recruitmentDate ? calculateMonthsElapsed(recruitmentDate, referenceDate) : null;
      
      let formattedRawDate = "";
      if (recruitmentDate) {
        const d = recruitmentDate.getDate().toString().padStart(2, "0");
        const m = (recruitmentDate.getMonth() + 1).toString().padStart(2, "0");
        const y = recruitmentDate.getFullYear();
        formattedRawDate = `${d}/${m}/${y}`;
      } else if (rawDate) {
        formattedRawDate = String(rawDate);
      }

      const phone = getVal("מספר טלפון", 6);
      const researchStatus = getVal("סטטוס במחקר", 15);
      const stool = getVal("צואה", 8);
      const isWithdrawn = researchStatus.includes("פרש");

      return {
        id,
        recruitmentDate,
        recruitmentDateRaw: formattedRawDate,
        tz: getVal("ת.ז.", 2),
        firstName: getVal("שם פרטי", 3),
        lastName: getVal("שם משפחה", 4),
        address: getVal("כתובת", 5),

        notes: getVal("הערות", 17),
        monthsElapsed,
        isWithdrawn,
        formattedPhone: formatWhatsAppPhone(phone),
      };

      return (

          {paths[name] || <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="2" fill="none" />}
        </svg>
      );
    }

    // ==========================================
    // 2. MAIN APPLICATION COMPONENT
    // ==========================================

    function App() {
      const [rawRows, setRawRows] = useState([]);
      const [headers, setHeaders] = useState([]);
      const [participants, setParticipants] = useState([]);
      const [headerMap, setHeaderMap] = useState({});
      const [headerRowIndex, setHeaderRowIndex] = useState(0);
      const [showMappingModal, setShowMappingModal] = useState(false);
      const [fileName, setFileName] = useState("");
      const [isDragOver, setIsDragOver] = useState(false);
      const [uploadMethod, setUploadMethod] = useState("file");
      const [pasteText, setPasteText] = useState("");

      const [referenceDate, setReferenceDate] = useState(
        new Date("2026-06-02").toISOString().substring(0, 10)
      );
      const [exactMatchMode, setExactMatchMode] = useState("floor");
      const [templateText, setTemplateText] = useState(() => {
        return localStorage.getItem("sheba_whatsapp_template_v2") || DEFAULT_TEMPLATE;
      });
      const [selectedTemplateId, setSelectedTemplateId] = useState("std_11m");
      const [linkMode, setLinkMode] = useState("universal");
      const [isEditingTemplate, setIsEditingTemplate] = useState(false);
      const [targetFollowUpMonth, setTargetFollowUpMonth] = useState(11);

      const [searchQuery, setSearchQuery] = useState("");
      const [filterWithdrawn, setFilterWithdrawn] = useState(true);
      const [selectedParticipantId, setSelectedParticipantId] = useState(null);
      const [copySuccessId, setCopySuccessId] = useState(null);

      const [sentRecords, setSentRecords] = useState(() => {
        try {
          const saved = localStorage.getItem("sheba_sent_records_v1");
          return saved ? JSON.parse(saved) : {};
        } catch {
          return {};
        }
      });

      useEffect(() => {
        localStorage.setItem("sheba_sent_records_v1", JSON.stringify(sentRecords));
      }, [sentRecords]);

      const [activeTab, setActiveTab] = useState("matching");
      const [quickFilterSample, setQuickFilterSample] = useState("all");
      const [showManualForm, setShowManualForm] = useState(false);
      const [saveSuccess, setSaveSuccess] = useState(false);
      const [editingNotes, setEditingNotes] = useState("");

      // Form bindings
      const [manualId, setManualId] = useState("");
      const [manualFirstName, setManualFirstName] = useState("");
      const [manualLastName, setManualLastName] = useState("");
      const [manualTz, setManualTz] = useState("");
      const [manualPhone, setManualPhone] = useState("");
      const [manualRecruitmentDate, setManualRecruitmentDate] = useState("2025-07-02");
      const [manualStool, setManualStool] = useState("");
      const [manualNotes, setManualNotes] = useState("גיוס ידני ממרפאת המעקב");

      const fileInputRef = useRef(null);

      useEffect(() => {
        localStorage.setItem("sheba_whatsapp_template_v2", templateText);
      }, [templateText]);

      // Dynamic computations on raw row grid and mappings
      useEffect(() => {
        if (rawRows.length > 0) {
          const baseRefDate = new Date(referenceDate);
          const mappedList = [];

          for (let i = headerRowIndex + 1; i < rawRows.length; i++) {
            const row = rawRows[i];
            if (!row || row.length === 0 || row.every(cell => cell === null || cell === undefined || cell === "")) {
              continue;
            }
            const p = mapRowToParticipant(row, headerMap, baseRefDate);
            mappedList.push(p);
          }

          setParticipants(mappedList);

          // Auto-select match
          if (mappedList.length > 0 && !mappedList.some(item => item.id === selectedParticipantId)) {
            const candidates = mappedList.filter(p => {
              if (p.monthsElapsed === null) return false;
              const match = exactMatchMode === "floor"
                ? Math.floor(p.monthsElapsed) === targetFollowUpMonth
                : Math.round(p.monthsElapsed) === targetFollowUpMonth;
              return match && (!filterWithdrawn || !p.isWithdrawn);
            });
            if (candidates.length > 0) {
              setSelectedParticipantId(candidates[0].id);
            } else {
              setSelectedParticipantId(mappedList[0].id);
            }
          }
        }
      }, [referenceDate, headerMap, rawRows, exactMatchMode, filterWithdrawn, targetFollowUpMonth, headerRowIndex]);

      useEffect(() => {
        const selectedP = participants.find(p => p.id === selectedParticipantId);
        setEditingNotes(selectedP ? selectedP.notes || "" : "");
      }, [selectedParticipantId, participants]);

      const handlePasteImport = (pastedText) => {
        if (!pastedText || !pastedText.trim()) {
          alert("אין טקסט פנוי להעתקה.");
          return;
        }
        try {
          const lines = pastedText.split(/\r?\n/).filter(line => line.trim() !== "");
          const rawGrid = lines
            .map(line => line.split('\t').map(cell => cell.trim()))
            .filter(row => row.some(cell => cell !== ""));

          if (rawGrid.length < 1) {
            alert("מבנה טקסט לא חוקי מאקסל.");
            return;
          }

          setFileName("נתוני העתקה ידנית.tsv");
          const bestIdx = findBestHeaderRowIndex(rawGrid);
          setHeaderRowIndex(bestIdx);

          const headerRowParsed = rawGrid[bestIdx] || [];
          setHeaders(headerRowParsed);
          setRawRows(rawGrid);

          const autoMapResult = buildHeaderMap(headerRowParsed);
          setHeaderMap(autoMapResult);
          setPasteText("");
        } catch (err) {
          console.error(err);
          alert("שגיאה בפריסת המידע.");
        }
      };

      const handleFileImport = (file) => {
        if (!file) return;
        setFileName(file.name);

        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const resultVal = e.target?.result;
            if (!resultVal) return;
            const data = new Uint8Array(resultVal);
            const workbook = XLSX.read(data, { type: "array" });
            if (!workbook.SheetNames || workbook.SheetNames.length === 0) {
              alert("קובץ לא תקין.");
              return;
            }
            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
            const rawGrid = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
            if (rawGrid.length < 1) {
              alert("גליון ריק ממידע.");
              return;
            }

            const bestIdx = findBestHeaderRowIndex(rawGrid);
            setHeaderRowIndex(bestIdx);

            const headerRowParsed = rawGrid[bestIdx] || [];
            setHeaders(headerRowParsed);
            setRawRows(rawGrid);

            const autoMapResult = buildHeaderMap(headerRowParsed);
            setHeaderMap(autoMapResult);
          } catch (err) {
            console.error(err);
            alert("שגיאה בקריאת גליון האקסל. וודא שהוא תקין והעלה שוב.");
          }
        };
        reader.readAsArrayBuffer(file);
      };

      const handleFileUploadChange = (e) => {
        const files = e.target.files;
        if (files && files.length > 0) handleFileImport(files[0]);
      };

      const handleLoadSample = () => {
        const baseRef = new Date(referenceDate);
        // Generates sample participants matching core Sheba structure
        const sampleData = [
          ["מספר משתתף", "תאריך גיוס", "ת.ז.", "שם פרטי", "שם משפחה", "כתובת", "מספר טלפון", "כתב הסכמה", "צואה", "רוק", "סרום", "שאלון כללי", "שאלון תזונתי", "סטטוס במחקר", "משתתף חוזר", "הערות"],
          ["1001", "02/07/2025", "123456782", "עדי", "אשכנזי", "אהרונסון 4, תל אביב", "0549932201", "V", "", "V", "V", "V", "V", "פעיל", "", "דרוש מעקב שבועי עבור 11 חודשים!"],
          ["1002", "20/06/2025", "987654321", "אורן", "לוי", "הלבנון 14, רמת גן", "0523456789", "V", "", "V", "", "V", "", "פעיל", "", "מטופל ממושך, נא לשלוח ערכת שליח לבית"],
          ["1003", "15/06/2025", "334455667", "שירה", "אברהם", "העצמאות 44, גבעתיים", "0501112222", "V", "", "V", "V", "V", "V", "פעיל", "כן", "מתעניינת בדו\"ח תזונה שני במחקר"],
          ["1004", "20/05/2025", "223344556", "ירון", "ברק", "ויצמן 80, גבעתיים", "0539151515", "V", "V", "V", "V", "V", "V", "פעיל", "", "שלח כבר דגימת מעקב של הכל"],
          ["1005", "28/06/2025", "998877112", "גיא", "שגב", "הבנים 10, רחובות", "0509998887", "V", "", "V", "", "V", "", "פרש - עבר דירה", "", "סטטוס פרש - לא לפנות לשליחות"]
        ];

        setHeaders(sampleData[0]);
        setRawRows(sampleData);
        setFileName("מעקב_מחקר_שיבא_דוגמה.xlsx");
        
        const map = {};
        sampleData[0].forEach((hdr, idx) => map[hdr] = idx);
        setHeaderMap(map);
        setSelectedParticipantId("1001");
      };

      const clearLoadedData = () => {
        setRawRows([]);
        setHeaders([]);
        setParticipants([]);
        setHeaderMap({});
        setFileName("");
        setSelectedParticipantId(null);
      };

      const replacePlaceholders = (template, p) => {
        if (!p) return "";
        const monthsStr = p.monthsElapsed !== null ? Math.floor(p.monthsElapsed).toString() : "11";
        return removeEmojis(template
          .replace(/{שם פרטי}/g, p.firstName || "משתתף/ת")
          .replace(/{שם משפחה}/g, p.lastName || "")
          .replace(/{תאריך גיוס}/g, p.recruitmentDateRaw || "מועד הגיוס")
          .replace(/{חודשים שערו}/g, monthsStr)
          .replace(/{חודשים שעברו}/g, monthsStr)
          .replace(/{מספר משתתף}/g, p.id || "")
          .replace(/{ת\.ז\.}/g, p.tz || "")
        );
      };

      const getWhatsAppUrl = (p) => {
        const rawMsg = replacePlaceholders(templateText, p);
        const encoded = encodeURIComponent(rawMsg);
        return linkMode === "web"
          ? `https://web.whatsapp.com/send?phone=${p.formattedPhone}&text=${encoded}`
          : `https://wa.me/${p.formattedPhone}?text=${encoded}`;
      };

      const copyToClipboard = (text, pId) => {
        navigator.clipboard.writeText(text).then(() => {
          setCopySuccessId(pId);
          setTimeout(() => setCopySuccessId(null), 2000);
        });
      };

      const addPlaceholderToken = (token) => {
        setTemplateText(prev => prev + ` {${token}}`);
      };

      const handleSaveNotes = (pId, notesContent) => {
        const idCol = headerMap["מספר משתתף"];
        const notesCol = headerMap["הערות"];
        if (idCol === undefined || notesCol === undefined) {
          alert("עמודות הערות ומזהים לא ממופות.");
          return;
        }

        const gridCpy = [...rawRows];
        let found = false;
        for (let i = 1; i < gridCpy.length; i++) {
          const row = gridCpy[i];
          if (row && String(row[idCol]).trim() === String(pId).trim()) {
            row[notesCol] = notesContent;
            found = true;
            break;
          }
        }
        if (found) {
          setRawRows(gridCpy);
          setSaveSuccess(true);
          setTimeout(() => setSaveSuccess(false), 2000);
        } else {
          alert("מטופל לא נמצא.");
        }
      };

      const handleAddManualParticipant = (e) => {
        e.preventDefault();
        if (!manualFirstName || !manualLastName || !manualPhone) {
          alert("אנא מלא שם פרטי, שם משפחה וטלפון.");
          return;
        }

        let currentHeaders = [...headers];
        let mappings = { ...headerMap };

        if (currentHeaders.length === 0) {
          currentHeaders = [
            "מספר משתתף", "תאריך גיוס", "ת.ז.", "שם פרטי", "שם משפחה", 
            "כתובת", "מספר טלפון", "כתב הסכמה", "צואה", "רוק", "סרום", 
            "סטטוס במחקר", "משתתף חוזר", "הערות"
          ];
          setHeaders(currentHeaders);
          currentHeaders.forEach((hdr, idx) => mappings[hdr] = idx);
          setHeaderMap(mappings);
        }

        let formattedRecDate = "02/07/2025";
        if (manualRecruitmentDate) {
          const parts = manualRecruitmentDate.split("-");
          if (parts.length === 3) formattedRecDate = `${parts[2]}/${parts[1]}/${parts[0]}`;
        }

        const generatedId = manualId.trim() || String(Date.now()).slice(-4);
        const newRow = currentHeaders.map((hdr) => {
          switch(hdr) {
            case "מספר משתתף": return generatedId;
            case "תאריך גיוס": return formattedRecDate;
            case "ת.ז.": return manualTz.trim();
            case "שם פרטי": return manualFirstName.trim();
            case "שם משפחה": return manualLastName.trim();
            case "כתובת": return "ניהול קליני ידני";
            case "מספר טלפון": return manualPhone.trim();
            case "כתב הסכמה": return "V";
            case "צואה": return manualStool;
            case "סטטוס במחקר": return "פעיל";
            case "הערות": return manualNotes.trim();
            default: return "";
          }
        });

        const newGrid = rawRows.length === 0 ? [currentHeaders, newRow] : [...rawRows, newRow];
        setRawRows(newGrid);
        if (!fileName) setFileName("רישום_קליני_ידני.xlsx");
        setSelectedParticipantId(generatedId);
        setShowManualForm(false);

        // Reset
        setManualId("");
        setManualFirstName("");
        setManualLastName("");
        setManualTz("");
        setManualPhone("");
        setManualNotes("גיוס ידני ממרפאת המעקב");
        setManualStool("");
      };

      const handleExportToExcel = () => {
        if (rawRows.length < 2) {
          alert("אין מידע לייצוא.");
          return;
        }
        try {
          const worksheet = XLSX.utils.aoa_to_sheet(rawRows);
          const workbook = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(workbook, worksheet, "מעקב משתתפים מעודכן");
          XLSX.writeFile(workbook, `שיבה_מעקב_משתתפים_מעודכן_${referenceDate}.xlsx`);
        } catch(err) {
          console.error(err);
          alert("שגיאה בייצוא קובץ אקסל חזרה.");
        }
      };

      const getTabParticipants = () => {
        let list = [];
        if (activeTab === "matching") {
          list = participants.filter(p => {
            if (p.monthsElapsed === null) return false;
            const isMatch = exactMatchMode === "floor"
              ? Math.floor(p.monthsElapsed) === targetFollowUpMonth
              : Math.round(p.monthsElapsed) === targetFollowUpMonth;
            return isMatch;
          });
        } else if (activeTab === "sent") {
          list = participants.filter(p => !!sentRecords[p.id]);
        } else {
          list = participants;
        }

        if (filterWithdrawn) list = list.filter(p => !p.isWithdrawn);

        if (searchQuery.trim() !== "") {
          const q = searchQuery.toLowerCase();
          list = list.filter(p => {
            const nameStr = `${p.firstName} ${p.lastName}`.toLowerCase();
            return nameStr.includes(q) || String(p.id).includes(q) || String(p.phone).includes(q) || String(p.notes).toLowerCase().includes(q);
          });
        }

        if (quickFilterSample === "missing_stool") {
          list = list.filter(p => {
            const hasStool = p.stool && (p.stool.toUpperCase() === "V" || p.stool.includes("כן") || p.stool.includes("✓"));
            return !hasStool;
          });
        } else if (quickFilterSample === "returning") {
          list = list.filter(p => p.returningParticipant && p.returningParticipant.trim() !== "");
        } else if (quickFilterSample === "has_notes") {
          list = list.filter(p => p.notes && p.notes.trim() !== "");
        }

        return list;
      };

      const activeList = getTabParticipants();
      const hasDateMappingIssue = participants.length > 0 && participants.filter(p => p.recruitmentDate !== null).length === 0;

      const markAsSent = (id) => {
        setSentRecords(prev => ({ ...prev, [id]: true }));
      };
      
      const removeSentMark = (id) => {
        setSentRecords(prev => {
          const cpy = { ...prev };
          delete cpy[id];
          return cpy;
        });
      };

      const handleSelectTemplate = (id) => {
        setSelectedTemplateId(id);
        const t = CLINICAL_TEMPLATES.find(c => c.id === id);
        if (t) setTemplateText(t.text);
      };

      const selectedParticipant = activeList.find(p => p.id === selectedParticipantId) || activeList[0] || null;

      return (
        <div className="h-screen w-full flex flex-col overflow-hidden bg-slate-50 text-slate-800 antialiased selection:bg-teal-100 selection:text-teal-950">
          
          {/* HEADER */}
          <header className="h-16 bg-[#0E2232] text-white flex items-center justify-between px-6 shrink-0 shadow-md">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-teal-600 rounded-xl flex items-center justify-center font-extrabold text-[13px] text-white">
                שיבא
              </div>
              <div className="text-right">
                <h1 className="text-sm font-bold flex items-center gap-2">
                  <span>מרכז המיקרוביום והתזונה של שיבא</span>
                  <span className="text-[10px] bg-teal-500/15 text-teal-300 px-2.5 py-0.5 rounded-full border border-teal-500/20 font-bold">
                    ערוץ מעקב {targetFollowUpMonth} חודשים
                  </span>
                </h1>
                <p className="text-[9.5px] text-slate-400">מערכת קלינית אישית מוגנת לסינון תיקים, חישוב מועדים ושיגור מנוטר של פניות לווטסאפ</p>
              </div>
            </div>

            <div className="flex items-center gap-3 select-none">
              <div className="flex items-center gap-1.5 bg-slate-800/60 px-3 py-1 text-xs border border-white/10 rounded-lg">
                <Icon name="Clock" className="w-3.5 h-3.5 text-teal-400" />
                <span className="text-slate-300">יעד מעקב:</span>
                <select 
                  value={targetFollowUpMonth}
                  onChange={(e) => setTargetFollowUpMonth(parseInt(e.target.value, 10))}
                  className="bg-transparent text-teal-300 font-bold outline-none cursor-pointer text-xs"
                >
                  {[3, 6, 9, 11, 12, 18, 24].map(m => (
                    <option key={m} value={m} className="text-slate-900 bg-white">חודש {m}</option>
                  ))}
                </select>
              </div>

              <div className="flex items-center gap-1.5 bg-slate-800/60 px-3 py-1 text-xs border border-white/10 rounded-lg">
                <Icon name="Calendar" className="w-3.5 h-3.5 text-teal-400" />
                <span className="text-slate-300">תאריך ציון קליני:</span>
                <input 
                  type="date"
                  value={referenceDate}
                  onChange={(e) => setReferenceDate(e.target.value)}
                  className="bg-transparent text-teal-300 font-bold font-mono outline-none text-xs w-[110px]"
                />
              </div>

              <button 
                onClick={handleExportToExcel}
                disabled={rawRows.length < 2}
                className="bg-teal-600 hover:bg-teal-500 disabled:opacity-30 disabled:pointer-events-none px-4 py-1.5 rounded-lg text-xs font-bold text-white transition-all flex items-center gap-1.5"
              >
                <Icon name="FileDown" className="w-4 h-4"/>
                ייצא אקסל (.xlsx)
              </button>
            </div>
          </header>

          {/* QUICK METRICS */}
          <section className="bg-white border-b border-slate-200 px-6 py-2.5 shrink-0 grid grid-cols-3 gap-6 shadow-sm select-none">
            <div className="bg-slate-50 border border-slate-200 rounded-lg p-2 flex items-center justify-between">
              <div>
                <span className="text-[10px] text-slate-500 font-bold block uppercase">משתתפים בקובץ</span>
                <span className="text-xl font-mono font-black text-slate-850">{participants.length}</span>
              </div>
              <div className="p-2 bg-slate-200 rounded text-slate-500">
                <Icon name="Database" className="w-5 h-5"/>

            <div className="bg-teal-50/40 border border-teal-100 rounded-lg p-2 flex items-center justify-between">
              <div>
                <span className="text-[10px] text-teal-700 font-bold block uppercase">זכאים למחזור {targetFollowUpMonth} ח׳</span>
                <span className="text-xl font-mono font-black text-teal-900">
                  {participants.filter(p => {
                    if (p.monthsElapsed === null) return false;
                    const m = exactMatchMode === "floor" ? Math.floor(p.monthsElapsed) : Math.round(p.monthsElapsed);
                    return m === targetFollowUpMonth && (!filterWithdrawn || !p.isWithdrawn);
                  }).length}

              <div>
                <span className="text-[10px] text-amber-800 font-bold block uppercase">דגימות צואה חסרות (מעקב)</span>
                <span className="text-xl font-mono font-black text-amber-900">
                  {participants.filter(p => {
                    const isTarget = (exactMatchMode === "floor" ? Math.floor(p.monthsElapsed || 0) : Math.round(p.monthsElapsed || 0)) === targetFollowUpMonth;
                    const hasStool = p.stool && (p.stool.toUpperCase() === "V" || p.stool.includes("כן") || p.stool.includes("✓"));
                    return isTarget && !hasStool && (!filterWithdrawn || !p.isWithdrawn);
                  }).length}
                </span>
              </div>

            {/* SIDEBAR */}

              {/* UPLOAD PANEL */}
              <div className="bg-slate-50 border border-slate-200 rounded-lg p-3.5 space-y-3">
                <div className="flex items-center justify-between pb-1 balance gap-2 border-b border-slate-200">
                  <h3 className="text-xs font-bold text-slate-800 flex items-center gap-1.5">
                    <Icon name="FileSpreadsheet" className="w-4 h-4 text-teal-600" />
                    קובץ מקור

                      נקה

                  )}

                          <span className="text-[10px] font-mono bg-slate-250 text-slate-600 px-2 rounded-full font-bold">#{selectedParticipant.id}</span>
                        </div>

                        <div className="space-y-1.5 text-xs">
                          <div>
                            <span className="text-[9px] text-slate-400 block font-bold">שם מלא:</span>
                            <span className="text-slate-900 font-black text-sm">{selectedParticipant.firstName} {selectedParticipant.lastName}</span>
                          </div>
                          <div className="grid grid-cols-2 gap-2">
                            <div>
                              <span className="text-[9px] text-slate-400 block font-bold">תעודת זהות:</span>
                              <span className="font-bold text-slate-700 font-mono">{selectedParticipant.tz || "-"}</span>
                            </div>
                            <div>
                              <span className="text-[9px] text-slate-400 block font-bold">טלפון:</span>
                              <span className="font-bold text-slate-700 font-mono">{selectedParticipant.phone}</span>
                            </div>
                          </div>
                        </div>

                        {/* CLINICAL NOTE WRITING AREA */}
                        <div className="space-y-1">
                          <span className="text-[9px] text-slate-400 block font-bold">הערות מעקב (נשמרים בקולקטיב אקסל):</span>
                          <div className="relative">
                            <textarea 
                              rows={2} 
                              value={editingNotes}
                              onChange={(e) => setEditingNotes(e.target.value)}
                              placeholder="כתוב מידע לגבי שליח, מענה או סירובי פציאנט..."
                              className="w-full bg-white border border-slate-350 rounded-lg p-1.5 text-[10px] leading-snug outline-none focus:ring-1 focus:ring-teal-500 font-medium resize-none text-slate-800"
                            />
                            <button 
                              onClick={() => handleSaveNotes(selectedParticipant.id, editingNotes)}
                              className="absolute bottom-1.5 left-1.5 bg-teal-600 hover:bg-teal-700 text-white font-bold text-[8.5px] px-2 py-0.5 rounded shadow-xs"
                            >
                              שמור הערה 💾
                            </button>
                          </div>
                          {saveSuccess && <p className="text-[9px] text-emerald-600 font-bold block animate-bounce">ההערה נשמרה ותיוצא באקסל!</p>}
                        </div>
                      </div>

                      {/* SENT CONTROL TOGGLE */}
                      <div className="border-t border-slate-205 pt-2 select-none text-[10.5px]">
                        <div className="flex gap-2">
                          {sentRecords[selectedParticipant.id] ? (
                            <button onClick={() => removeSentMark(selectedParticipant.id)} className="flex-1 bg-red-50 hover:bg-red-100 text-red-700 font-bold py-1 rounded border border-red-200">
                              בטל סימון פנייה
                            </button>
                          ) : (
                            <button onClick={() => markAsSent(selectedParticipant.id)} className="flex-1 bg-emerald-50 hover:bg-emerald-100 text-emerald-800 font-bold py-1 rounded border border-emerald-250">
                              סמן כ"פנייה בוצעה"
                            </button>
                          )}
                        </div>
                      </div>

                    </div>
                  </React.Fragment>
                ) : (
                  <div className="flex-1 flex flex-col items-center justify-center text-center p-8 text-slate-400 select-none">
                    <Icon name="AlertCircle" className="w-6 h-6 text-slate-300 animate-pulse mb-1" />
                    <p className="text-xs font-bold text-slate-700">אנא בחר פציאנט מהטבלה</p>
                    <p className="text-[10px] text-slate-400">יש לבחור מטופל לשם הצגת תבנית WhatsApp אישית ותיק מעקב קליני.</p>
                  </div>
                )}
              </div>

            </main>

          </div>

          {/* PRIVACY FOOTER */}
          <footer className="h-8 bg-white border-t border-slate-200 flex items-center justify-between px-6 shrink-0 text-[10px] text-slate-450 font-bold select-none">
            <div>© {new Date().getFullYear()} מרכז רפואי שיבא, תל השומר | מחלקת מחקר תזונה ומיקרוביום</div>
            <div className="text-rose-700/80 hover:text-rose-700 transition-colors flex items-center gap-1">
              <Icon name="Shield" className="w-3.5 h-3.5 text-rose-600 animate-pulse shrink-0" />
              סודיות קלינית עליונה: הפענוח והעיבוד של גליונות אקסל מבוצעים באופן מקומי בדפדפן בלבד ללא שום שרת חיצוני!
            </div>
          </footer>

          {/* COLUMN MAPPING EDIT DIALOG */}
          {showMappingModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-xs p-4 flex-col select-none" dir="rtl">
              <div className="bg-white rounded-xl w-full max-w-xl max-h-[85vh] flex flex-col shadow-2xl border border-slate-200 overflow-hidden relative">
                
                {/* Modal Header */}
                <div className="bg-[#0E2232] text-white px-5 py-3.5 flex items-center justify-between border-b shrink-0">
                  <div className="flex items-center gap-2">
                    <Icon name="Sliders" className="w-5 h-5 text-teal-400" />
                    <div className="text-right">
                      <h3 className="font-bold text-sm text-white">התאמת מיפוי עמודות באקסל</h3>
                      <p className="text-[10px] text-slate-300">בחר איזו כותרת באקסל שלך מייצגת כל שדה בתוכנת המערכת</p>
                    </div>
                  </div>
                  <button onClick={() => setShowMappingModal(false)} className="text-slate-300 hover:text-white font-bold p-1">✕</button>
                </div>

                {/* Modal Body */}
                <div className="flex-1 overflow-y-auto p-5 space-y-4 custom-scrollbar">
                  
                  {headers.length === 0 ? (
                    <div className="text-center py-10 text-slate-400">
                      <Icon name="Database" className="w-10 h-10 text-slate-300 mx-auto mb-1" />
                      <p className="text-xs font-bold">טרם נטען קובץ מעקב משתתפים</p>
                    </div>
                  ) : (
                    <React.Fragment>
                      
                      {/* HEADER ROW ROW SELECTOR */}
                      <div className="bg-slate-50 border border-slate-200 p-3 rounded-lg flex items-center justify-between gap-3 text-right text-xs">
                        <div>
                          <p className="font-black text-slate-800">שורת כותרות הטבלה (אקסל):</p>
                          <p className="text-[10px] text-slate-400 leading-normal">בחר מאיזו שורה בקובץ מיוצרים שמות העמודות (במידה ויש שורות ריקות בראש הגליון)</p>
                        </div>
                        <select 
                          value={headerRowIndex}
                          onChange={(e) => {
                            const val = parseInt(e.target.value, 10);
                            setHeaderRowIndex(val);
                            if (rawRows[val]) {
                              setHeaders(rawRows[val]);
                              const map = buildHeaderMap(rawRows[val]);
                              setHeaderMap(map);
                            }
                          }}
                          className="bg-white border rounded font-mono p-1 font-bold outline-none"
                        >
                          {rawRows.slice(0, 8).map((row, idx) => (
                            <option key={idx} value={idx}>
                              שורה {idx + 1}: {Array.isArray(row) ? row.slice(0, 3).map(String).join(" | ").substring(0, 30) : ""}...
                            </option>
                          ))}
                        </select>
                      </div>

                      {/* SCHEMAS */}
                      <div className="border border-slate-200 rounded-lg overflow-hidden shadow-3xs max-h-[35vh] overflow-y-auto custom-scrollbar">
                        <div className="grid grid-cols-2 bg-slate-100 p-2 text-xs font-black border-b text-slate-700">
                          <div>שדה מדד במערכת</div>
                          <div>עמודה משויכת באקסל שלך</div>
                        </div>
                        <div className="divide-y divide-slate-150">
                          {SCHEMA_FIELDS.map(f => {
                            const val = headerMap[f.key];
                            return (
                              <div key={f.key} className="grid grid-cols-2 p-2 items-center text-[10.5px]">
                                <div className="font-bold text-slate-800 flex items-center gap-1">
                                  <span>{f.label}</span>
                                  {f.required && <span className="text-red-500 font-bold">*</span>}
                                </div>
                                <select 
                                  value={val !== undefined ? val : -1} 
                                  onChange={(e) => setHeaderMap(prev => ({ ...prev, [f.key]: parseInt(e.target.value, 10) }))}
                                  className={`w-full border rounded p-1 text-[11px] font-bold outline-none ${val !== undefined && val !== -1 ? "bg-teal-55 text-teal-900 border-teal-300" : f.required ? "bg-red-50 border-red-300 text-red-800" : "bg-white border-slate-350 text-slate-400"}`}
                                >
                                  <option value={-1}>✕ [לא ממופה / ריק]</option>
                                  {headers.map((h, i) => <option key={i} value={i}>עמודה {i+1}: {h || `עמודה ללא שם`}</option>)}
                                </select>
                              </div>
                            );
                          })}
                        </div>
                      </div>

                    </React.Fragment>
                  )}

                </div>

                {/* Footer Modal Options */}
                <div className="bg-slate-50 border-t p-3 flex justify-between select-none">
                  <button 
                    disabled={headers.length === 0}
                    onClick={() => setHeaderMap(buildHeaderMap(headers))}
                    className="bg-slate-200 hover:bg-slate-300 disabled:opacity-40 text-slate-600 px-3.5 py-1.5 rounded-lg text-xs font-bold transition-all"
                  >
                    שחזר מיפוי אוטומטי 🔄
                  </button>
                  <button 
                    onClick={() => setShowMappingModal(false)}
                    className="bg-teal-600 hover:bg-teal-700 text-white font-extrabold px-6 py-1.5 rounded-lg text-xs transition-all"
                  >
                    אישור ושמירה קלינית
                  </button>
                </div>

              </div>
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
